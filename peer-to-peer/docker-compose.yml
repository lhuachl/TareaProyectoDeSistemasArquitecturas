# ─────────────────────────────────────────────────────────────────────────────
#  P2P To-Do — 3 independent nodes
#  Each node:
#    • runs its own FastAPI instance
#    • has its own in-memory task list
#    • knows the other two nodes via PEERS env var
#
#  Access the UI:
#    Node A → http://localhost:8001
#    Node B → http://localhost:8002
#    Node C → http://localhost:8003
# ─────────────────────────────────────────────────────────────────────────────

services:

  node_a:
    build:
      context: .
      dockerfile: dockerfile
    container_name: p2p_node_a
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      NODE_ID: "Node-A"
      # peers are the OTHER two nodes (Docker internal DNS)
      PEERS: "http://node_b:8002,http://node_c:8003"
    networks:
      - p2p_net

  node_b:
    build:
      context: .
      dockerfile: dockerfile
    container_name: p2p_node_b
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
      NODE_ID: "Node-B"
      PEERS: "http://node_a:8001,http://node_c:8003"
    networks:
      - p2p_net

  node_c:
    build:
      context: .
      dockerfile: dockerfile
    container_name: p2p_node_c
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      NODE_ID: "Node-C"
      PEERS: "http://node_a:8001,http://node_b:8002"
    networks:
      - p2p_net

networks:
  p2p_net:
    driver: bridge
